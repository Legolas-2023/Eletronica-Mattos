<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="shortcut icon" href="/assets/EM.png" type="image/x-icon">
    <link rel="stylesheet" href="/styles/output.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body id="login-body">
    <main id="main-login" class="bg-login flex">
        <img src="/assets/EM.gif" id="logo-em" class="w-[50%] rounded-lg max-md:hidden flex-shrink">
        <section class="flex flex-col flex-shrink gap-7 rounded-lg border border-color1 w-[40%] max-md:w-[70%] max-sm:w-[90%] px-5 py-12 bg-color10 z-10 transition duration-700 ease-in-out drop-shadow-xz hover:bg-color2">
            <i class="bi bi-person-circle flex justify-center items-start text-7xl"></i>
            <form method="post" id="login-form" class="flex flex-col gap-5">
                <label for="email" class="flex justify-center items-center gap-2">
                    <i class="bi bi-envelope-at-fill text-lg"></i>
                    <input type="email" name="email" id="email" class="w-full text-lg p-1 border max-sm:text-sm border-color1" required>
                </label>
                <label for="password" class="flex justify-center items-center gap-2">
                    <i class="bi bi-key-fill text-lg"></i>
                    <input type="password" name="password" id="password" class="w-full text-lg p-1 border max-sm:text-sm  border-color1" required>
                </label>
                <input class="bi-input w-full text-lg p-1 transition bg-color11 rounded-lg duration-700 ease-in-out cursor-pointer hover:bg-color6 hover:text-color2" type="submit" value="Login">
            </form>
        </section>
    </main>
</body>
 <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
 <script src="/js/dados.js"></script>
<script src="/js/script.js"></script>
</html>
