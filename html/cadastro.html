<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="shortcut icon" href="../assets/EM.png" type="image/x-icon">
    <link rel="stylesheet" href="/styles/cadastro.css">
    <title>EM Eletrônica Mattos - Cadastro</title>
</head>
<body>
    <header id="header"></header>
    <main>
        <section>
            <h1>Cadastro de Placas</h1>

            <form method="get">
                <fieldset id="mn">
                    <label for="name">Nome da Placa: <input type="text" name="name" id="name" required placeholder="TV AOC 32S5195/78G"></label>
                    

                    <label for="tv">Nome da TV: <input type="text" name="tv" id="tv" required placeholder="AOC"></label>
                    

                    <label for="modelo">Modelo: <input type="text" name="modelo" id="modelo" required placeholder="32S5195/78G"></label>
                    
                    <fieldset id="mn-sb">
                        <label for="quantidade">Quantidade: <input type="number" name="quantidade" id="quantidade" required></label>

                        <label for="caixa">Caixa: <input type="number" name="caixa" id="caixa" required></label>
                        
                    </fieldset>
                    <button type="submit">Salvar</button>
                </fieldset>
            </form>
        </section>
    </main>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="/js/dados.js"></script>
    <script src="/js/header.js"></script>
    <script src="/js/cadastro.js"></script>
</body>
</html>
