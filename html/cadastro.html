<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="shortcut icon" href="../assets/EM.png" type="image/x-icon">
    <link rel="stylesheet" href="../styles/output.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <title>EM Eletrônica Mattos - Cadastro</title>
</head>
<body>
    <header id="hd-nav" class="sticky top-0 flex items-center justify-between bg-color1 drop-shadow-xl w-full">
        <figure id="nav-logo" class="w-1/2 flex justify-start items-center text-color2 gap-2.5">
            <a href="../html/menu.html" class="flex justify-center items-center">
                <img src="../assets/EM.gif" alt="Eletrônica Mattos" class="w-24 max-w-72 p-1">
            </a>
            <figcaption class="text-xl max-md:hidden">EM Eletrônica Mattos</figcaption>
        </figure>
        <nav id="hd-nav-lk" class="top-0 transition duration-700 ease-in-out hover:drop-shadow-xs">
            <button class="cursor-pointer text-2xl text-color2 transition duration-300 ease-in-out flex items-center gap-2 focus:drop-shadow-xs px-3" aria-label="Usuário" id="user">
                <i class="bi bi-person-circle"></i>
                <span class="user-name text-lg max-[375px]:hidden"></span>
            </button>
            <ul id="teste" class="nav-lk absolute drop-shadow-xs w-40 p-0 top-11 right-1 bg-color1 opacity-0 pointer-events-none">
                <li class="nav-lk-lv flex justify-end items-center p-1.5"><span class="user-name-sb hidden max-[375px]:block text-color2 text-sm flex-grow"></span><button aria-label="Close" id="close" class="bi bi-x-circle-fill flex justify-end items-center text-color9 text-lg p-2.5 transition duration-700 ease-in-out hover:text-color7"></button></li>
                <li class="nav-lk-frt">
                    <ul class="flex flex-col text-color2 text-lg"> 
                        <li class="cd-hv"><a href="../html/cadastro.html" class="py-5 px-0 flex justify-center transition duration-700 ease-in-out hover:bg-color2 hover:text-color1">Cadastrar</a></li>
                        <li class="cd-hv"><a href="../html/placas.html" class="py-5 px-0 flex justify-center transition duration-700 ease-in-out hover:bg-color2 hover:text-color1">Placas</a></li>
                        <li class="cd-hv"><button class="bi bi-door-open-fill flex justify-center gap-3 items-center w-full py-5 text-color7 text-lg cursor-pointer transition duration-700 ease-in-out hover:bg-color7 hover:text-color2" aria-label="Logoff" id="logoff">Sair</button></li>
                    </ul>
                </li>
            </ul>
        </nav>
    </header>

    <main id="main-content">
        <section class="cad h-[screen] flex justify-center items-center flex-col">
            <h1 class="text-[4vw] font-extrabold">Cadastro de Placas</h1>

            <form method="get" class="border-4 rounded-2xl border-color6 shadow-2xl w-[70%] p-4 bg-color10 hover:bg-color2 transition duration-700 ease-in-out max-md:w-[90%]">
                <fieldset id="mn" class="flex flex-col gap-2 text-[1vw] max-md:text-[1.5vw] max-[425px]:text-[2vw]">
                    <label for="name" class="font-extrabold">Nome da Placa: <input type="text" name="name" id="name" class="inpt-cads" required placeholder="TV AOC 32S5195/78G" autocomplete="off"></label>
                    

                    <label for="tv" class="font-extrabold">Nome da TV: <input type="text" name="tv" id="tv" class="inpt-cads" required placeholder="AOC" autocomplete="off"></label>
                    

                    <label for="modelo" class="font-extrabold">Modelo: <input type="text" name="modelo" id="modelo" class="inpt-cads" required placeholder="32S5195/78G" autocomplete="off"></label>
                    
                    <fieldset id="mn-sb" class="flex w-full justify-center items-center gap-5 max-[425px]:flex-col">
                        <label for="quantidade" class="w-full font-extrabold">Quantidade: <input type="number" name="quantidade" id="quantidade" class="inpt-cads" required autocomplete="off"></label>

                        <label for="caixa" class="w-full font-extrabold">Caixa: <input type="number" name="caixa" id="caixa" class="inpt-cads" required autocomplete="off"></label>
                        
                    </fieldset>
                    <button type="submit" class="w-1/2 my-5 mx-auto p-2.5 border bg-color11 rounded-2xl cursor-pointer transition duration-700 ease-in-out font-extrabold hover:bg-color4 hover:text-color2 max-[425px]:w-full">Salvar</button>
                </fieldset>
            </form>
        </section>
    </main>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="/js/dados.js"></script>
    <script src="/js/header.js"></script>
    <script src="/js/cadastro.js"></script>
</body>
</html>
